<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Diet Notebook</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-labelledby="app-title">
        <div>
          <p class="eyebrow">Healthy weight journey</p>
          <h1 id="app-title">My Diet Notebook</h1>
        </div>
        <div class="today-card">
          <span id="today-label"></span>
          <strong id="streak-count">0日</strong>
          <small id="sync-status">端末保存</small>
        </div>
      </section>

      <section class="summary-grid" aria-label="今日の概要">
        <article class="metric">
          <span>現在体重</span>
          <strong id="current-weight">-- kg</strong>
          <small id="weight-trend">記録を始めましょう</small>
        </article>
        <article class="metric">
          <span>今週の健康スコア</span>
          <strong id="weekly-score">--</strong>
          <small>食事・運動・睡眠・気分</small>
        </article>
        <article class="metric">
          <span>今日の一言</span>
          <strong id="daily-message">焦らず整える</strong>
          <small>無理なく続くペースで</small>
        </article>
      </section>

      <section class="workspace">
        <form id="entry-form" class="panel" autocomplete="off">
          <div class="panel-heading">
            <h2>今日の記録</h2>
            <input type="date" id="entry-date" name="date" required>
          </div>

          <div class="field-row">
            <label>
              <span>体重 kg</span>
              <input type="number" id="weight" name="weight" min="20" max="250" step="0.1" placeholder="例: 62.4">
            </label>
            <label>
              <span>睡眠 時間</span>
              <input type="number" id="sleep" name="sleep" min="0" max="24" step="0.5" placeholder="例: 7">
            </label>
          </div>

          <fieldset>
            <legend>食事の整い方</legend>
            <div class="segmented">
              <label><input type="radio" name="meal" value="1"><span>乱れた</span></label>
              <label><input type="radio" name="meal" value="2"><span>ふつう</span></label>
              <label><input type="radio" name="meal" value="3" checked><span>整った</span></label>
            </div>
          </fieldset>

          <fieldset>
            <legend>今日できたこと</legend>
            <div class="checks">
              <label><input type="checkbox" name="habits" value="water">水分を意識</label>
              <label><input type="checkbox" name="habits" value="protein">たんぱく質</label>
              <label><input type="checkbox" name="habits" value="vegetables">野菜・海藻</label>
              <label><input type="checkbox" name="habits" value="walk">歩く・運動</label>
              <label><input type="checkbox" name="habits" value="no_snack">間食控えめ</label>
            </div>
          </fieldset>

          <label>
            <span>気分</span>
            <select id="mood" name="mood">
              <option value="calm">落ち着いている</option>
              <option value="good">調子がいい</option>
              <option value="tired">疲れている</option>
              <option value="hungry">空腹感が強い</option>
              <option value="stress">ストレス多め</option>
            </select>
          </label>

          <label>
            <span>メモ</span>
            <textarea id="note" name="note" rows="4" placeholder="食べたもの、体調、明日の自分に残したいこと"></textarea>
          </label>

          <button class="primary-button" type="submit">記録する</button>
        </form>

        <aside class="panel insights">
          <div class="panel-heading">
            <h2>ふりかえり</h2>
            <button id="clear-today" class="ghost-button" type="button">今日を消す</button>
          </div>
          <div id="advice-list" class="advice-list"></div>
          <div class="progress-block">
            <div class="progress-label">
              <span>今週の行動達成</span>
              <strong id="habit-progress-label">0%</strong>
            </div>
            <div class="progress-track">
              <div id="habit-progress" class="progress-fill"></div>
            </div>
          </div>
        </aside>
      </section>

      <section class="panel cloud-panel">
        <div class="panel-heading">
          <h2>クラウド同期</h2>
          <button id="sync-now" class="ghost-button" type="button">同期する</button>
        </div>
        <form id="cloud-form" class="cloud-form" autocomplete="off">
          <label>
            <span>Supabase URL</span>
            <input id="cloud-url" name="cloudUrl" type="url" placeholder="https://xxxx.supabase.co">
          </label>
          <label>
            <span>Anon key</span>
            <input id="cloud-key" name="cloudKey" type="password" placeholder="Supabaseのanon public key">
          </label>
          <label>
            <span>同期ID</span>
            <input id="cloud-id" name="cloudId" type="text" placeholder="例: my-diet-note">
          </label>
          <label>
            <span>同期パスワード</span>
            <input id="cloud-password" name="cloudPassword" type="password" placeholder="スマホとPCで同じもの">
          </label>
          <button class="primary-button" type="submit">クラウド設定を保存</button>
        </form>
      </section>

      <section class="panel history-panel">
        <div class="panel-heading">
          <h2>記録履歴</h2>
          <button id="export-data" class="ghost-button" type="button">データを書き出す</button>
        </div>
        <div class="history-list" id="history-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
